<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <style>
    .node { font-family: 'Segoe UI', system-ui, sans-serif; font-weight: 600; font-size: 13px; fill: #ffffff; }
    .label { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 11px; fill: #94a3b8; }
    .title { font-family: 'Segoe UI', system-ui, sans-serif; font-weight: bold; font-size: 15px; fill: #22c55e; }
  </style>

  <!-- Connection Lines -->
  <line x1="200" y1="65" x2="70" y2="140" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4"/>
  <line x1="200" y1="65" x2="330" y2="140" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4"/>
  <line x1="200" y1="65" x2="200" y2="230" stroke="#22c55e" stroke-width="2" stroke-dasharray="4"/>

  <!-- Developer Node -->
  <rect x="140" y="20" width="120" height="45" rx="8" fill="#0f172a" stroke="url(#glow)" stroke-width="2" filter="url(#shadow)"/>
  <text x="200" y="47" text-anchor="middle" class="title">MD. RAHAT</text>

  <!-- Left Node (Systems) -->
  <rect x="10" y="140" width="120" height="60" rx="8" fill="#1e1b4b" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="70" y="165" text-anchor="middle" class="node">Distributed</text>
  <text x="70" y="185" text-anchor="middle" class="label">ClusterOS / C#</text>

  <!-- Right Node (IoT) -->
  <rect x="270" y="140" width="120" height="60" rx="8" fill="#2c1a04" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="330" y="165" text-anchor="middle" class="node">IoT Hardware</text>
  <text x="330" y="185" text-anchor="middle" class="label">C++ / GPS / GSM</text>

  <!-- Bottom Node (Web) -->
  <rect x="140" y="230" width="120" height="60" rx="8" fill="#062f17" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <text x="200" y="255" text-anchor="middle" class="node">Web &amp; Cloud</text>
  <text x="200" y="275" text-anchor="middle" class="label">Next.js / Firebase</text>
</svg>
